<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>你我之间</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">

    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        :root {
    --bg-page: #f5f5f5;
    --bg-white: #ffffff;
    --bg-chat: #f5f5f5;
    --text-primary: #111;
    --text-secondary: #666;
    --border-light: #e5e5e5;
    --green-sent: #d9f0c3;      /* 改为更柔和的绿色 */
    --white-received: #ffffff;
    --accent: #07c160;           /* 微信绿保持不变 */
    --shadow-sm: 0 2px 8px rgba(0,0,0,0.05);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
    --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}
        [data-theme="dark"] { --bg-page: #111; --bg-white: #1e1e1e; --bg-chat: #000; --text-primary: #efefef; --text-secondary: #aaa; --border-light: #2c2c2c; --green-sent: #2b5e2b; --white-received: #2a2a2a; }
        [data-theme="eye-care"] { --bg-page: #e0e8cf; --bg-white: #f5f7e9; --bg-chat: #eef2e0; --text-primary: #2c3e2f; --text-secondary: #6f7e6a; --border-light: #d0ddbb; --green-sent: #9fc78b; --white-received: #fffff0; }
        body { background: var(--bg-page); color: var(--text-primary); font-family: var(--font-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .view-container { flex:1; display:flex; flex-direction:column; overflow:hidden; position:relative; }
        .view { display: none; flex-direction: column; height: 100%; overflow-y: auto; }
        .view.active { display: flex; }
        .chat-list-header, .friends-header, .manage-header, .profile-header { background: var(--bg-white); padding: 12px 16px; border-bottom: 1px solid var(--border-light); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
        .title { font-weight: 600; font-size: 20px; }
        .header-actions { display: flex; gap: 16px; position: relative; }
        .badge { position: absolute; top: -6px; right: -6px; background: #ff3b30; color: white; border-radius: 12px; min-width: 18px; height: 18px; font-size: 10px; display: flex; align-items: center; justify-content: center; padding: 0 4px; }
        .icon-btn { background: none; border: none; font-size: 20px; color: var(--text-secondary); cursor: pointer; padding: 4px; position: relative; }
        .search-input { background: var(--bg-page); border: none; border-radius: 20px; padding: 8px 12px; width: 100%; font-size: 14px; }
        .conversation-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--bg-white);
    border-radius: 16px;
    margin: 6px 12px;
    box-shadow: var(--shadow-sm);
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
}
.conversation-item:active {
    transform: scale(0.98);
    background: var(--bg-page);
}
        .conv-avatar { width: 48px; height: 48px; border-radius: 8px; background: #ddd; object-fit: cover; flex-shrink: 0; cursor: pointer; }
        .conv-info { flex: 1; min-width: 0; }
        .conv-name { font-weight: 500; font-size: 16px; }
        .conv-preview { font-size: 13px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .conv-time { font-size: 11px; color: var(--text-secondary); }
        .unread-badge { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: #ff3b30; color: white; border-radius: 12px; min-width: 20px; height: 20px; font-size: 11px; display: flex; align-items: center; justify-content: center; padding: 0 5px; }
        .chat-header { background: var(--bg-white); padding: 10px 12px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border-light); flex-shrink: 0; }
        .back-btn, .chat-more { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text-primary); }
        .chat-name { font-weight: 600; font-size: 17px; flex: 1; text-align: center; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 16px 12px; display: flex; flex-direction: column; gap: 12px; background: var(--bg-chat); }
        .message-row { display: flex; align-items: flex-start; gap: 8px; width: 100%; }
        .message-row.sent { justify-content: flex-end; }
        .message-row.received { justify-content: flex-start; }
        .message-avatar { width: 36px; height: 36px; border-radius: 6px; object-fit: cover; flex-shrink: 0; background: var(--border-light); }
        .bubble {
    max-width: 70%;
    padding: 10px 14px;
    border-radius: 20px;
    font-size: 15px;
    line-height: 1.45;
    word-break: break-word;
}
.sent .bubble {
    background: var(--green-sent);
    color: #000;
    border-bottom-right-radius: 4px;
}
.received .bubble {
    background: var(--white-received);
    color: var(--text-primary);
    border-bottom-left-radius: 4px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
}
        .sent .bubble {
    background: #81d159;      /* 恢复之前的浅绿 */
    color: #000;
    border-bottom-right-radius: 4px;
}
        .received .bubble { background: var(--white-received); color: var(--text-primary); border-bottom-left-radius: 4px; box-shadow: var(--shadow-sm); }
        .message-image { max-width: 200px; border-radius: 8px; margin-top: 8px; cursor: pointer; }
        .message-meta { display: none; }
        .chat-input-area { background: var(--bg-white); padding: 8px 12px; display: flex; align-items: center; gap: 10px; border-top: 1px solid var(--border-light); flex-shrink: 0; }
        .voice-call-btn, .emoji-btn, .send-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text-secondary); }
        .send-btn { color: var(--accent); }
        .input-wrapper {
    flex: 1;
    background: var(--bg-page);
    border-radius: 24px;
    padding: 8px 14px;
}
.msg-input {
    width: 100%;
    border: none;
    background: transparent;
    outline: none;
    font-size: 16px;
    font-family: var(--font-main);
    resize: none;
}
        .msg-input { width: 100%; border: none; background: transparent; outline: none; font-size: 15px; font-family: var(--font-main); resize: none; }
        .sticker-picker {
            position: absolute;
            bottom: 70px;
            left: 12px;
            right: 12px;
            background: var(--bg-white);
            border-radius: 20px;
            padding: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            z-index: 1200;
            display: none;
            flex-direction: column;
            max-height: 280px;
            overflow-y: auto;
        }
        .sticker-picker.active { display: flex; }
        .sticker-picker-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        .sticker-picker-item {
            aspect-ratio: 1 / 1;
            background: var(--bg-page);
            border-radius: 12px;
            cursor: pointer;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .sticker-picker-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .moment-item {
    background: var(--bg-white);
    border-radius: 20px;
    margin: 12px 16px;
    padding: 16px;
    box-shadow: var(--shadow-sm);
    transition: transform 0.1s, box-shadow 0.2s;
}
.moment-item:active {
    transform: scale(0.98);
    box-shadow: var(--shadow-md);
}
.moment-header {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
}
.moment-avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    object-fit: cover;
}
.moment-name {
    font-weight: 600;
    font-size: 16px;
}
.moment-time {
    font-size: 11px;
    color: var(--text-secondary);
}
.moment-content {
    margin: 12px 0;
    line-height: 1.45;
    font-size: 15px;
}
.moment-images {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin: 12px 0;
}
.moment-img {
    width: 100px;
    height: 100px;
    border-radius: 12px;
    object-fit: cover;
    cursor: pointer;
}
.moment-actions {
    border-top: 0.5px solid var(--border-light);
    margin-top: 12px;
    padding: 10px 0 4px;
    display: flex;
    gap: 24px;
}
.moment-action {
    font-size: 14px;
    gap: 6px;
}
.comment-list {
    background: var(--bg-page);
    border-radius: 16px;
    padding: 12px;
    margin-top: 12px;
}
.comment-item {
    font-size: 13px;
    margin-bottom: 10px;
}
.comment-del {
    opacity: 0.5;
}
        .moment-header { display: flex; gap: 10px; margin-bottom: 8px; }
        .moment-avatar { width: 44px; height: 44px; border-radius: 8px; object-fit: cover; }
        .moment-name { font-weight: 600; }
        .moment-time { font-size: 11px; color: var(--text-secondary); }
        .moment-content { margin: 8px 0; line-height: 1.5; }
        .moment-images { display: flex; gap: 6px; flex-wrap: wrap; margin: 8px 0; }
        .moment-img { width: 100px; height: 100px; object-fit: cover; border-radius: 8px; cursor: pointer; }
        .moment-actions { display: flex; gap: 20px; padding: 6px 0; border-top: 0.5px solid var(--border-light); margin-top: 8px; }
        .moment-action { background: none; border: none; font-size: 14px; color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; gap: 4px; }
        .moment-action.liked { color: #f48fb1; }
        .comment-list { margin-top: 8px; background: var(--bg-page); border-radius: 8px; padding: 8px; }
        .comment-item { font-size: 13px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
        .comment-del { background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 12px; }
        .settings-list { display: flex; flex-direction: column; gap: 12px; padding: 16px; }
        .settings-card { background: var(--bg-white); border-radius: 12px; padding: 16px 20px; display: flex; align-items: center; gap: 16px; cursor: pointer; transition: 0.1s; box-shadow: var(--shadow-sm); }
        .settings-card:active { transform: scale(0.98); background: var(--bg-page); }
        .settings-card i { font-size: 24px; color: var(--accent); width: 32px; text-align: center; }
        .settings-card span { font-size: 16px; font-weight: 500; flex: 1; }
        .modal {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    animation: modalBgFadeIn 0.3s ease;
}

@keyframes modalBgFadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
}

.modal-card {
    background: var(--bg-white);
    border-radius: 28px;
    width: 85%;
    max-width: 380px;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
    animation: modalSlideUp 0.3s cubic-bezier(0.34, 1.3, 0.64, 1);
    padding: 20px;
}

@keyframes modalSlideUp {
    from {
        opacity: 0;
        transform: translateY(24px) scale(0.96);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}
        .setting-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border-light); }
        .btn-primary, .btn-secondary, .btn-sm {
    border-radius: 24px;
    padding: 8px 20px;
    font-weight: 500;
    transition: opacity 0.2s;
}
.btn-primary:active, .btn-secondary:active, .btn-sm:active {
    opacity: 0.7;
}
        .tab-bar {
    display: flex;
    background: rgba(255,255,255,0.96);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-top: 0.5px solid rgba(0,0,0,0.05);
    padding: 8px 0 12px;
    flex-shrink: 0;
}
.tab-item {
    flex: 1;
    text-align: center;
    font-size: 10px;
    color: var(--text-secondary);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    position: relative;
}
.tab-item.active {
    color: var(--accent);
    font-weight: 500;
}
.tab-item i {
    font-size: 22px;
}
        .tab-item { flex: 1; text-align: center; font-size: 12px; color: var(--text-secondary); cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; }
        .tab-item.active { color: var(--accent); }
        .tab-item i { font-size: 22px; }
        .context-menu { position: fixed; background: var(--bg-white); border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); z-index: 2000; display: none; overflow: hidden; }
        .context-menu div { padding: 12px 20px; cursor: pointer; white-space: nowrap; }
        .context-menu div:hover { background: var(--bg-page); }
        .call-drag { position: fixed; bottom: 100px; right: 20px; width: 260px; background: var(--bg-white); border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); padding: 12px; z-index: 1100; display: none; flex-direction: column; gap: 8px; backdrop-filter: blur(10px); cursor: grab; user-select: none; }
        .call-drag:active { cursor: grabbing; }
        .call-drag-header { display: flex; align-items: center; gap: 10px; }
        .call-drag-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 20px; color: white; }
        .call-drag-info { flex: 1; }
        .call-drag-name { font-weight: 600; font-size: 14px; }
        .call-drag-status { font-size: 11px; color: var(--text-secondary); }
        .call-drag-buttons { display: flex; gap: 8px; justify-content: flex-end; }
        .call-drag-btn { padding: 4px 12px; border-radius: 16px; border: none; font-size: 12px; cursor: pointer; }
        .call-drag-btn-accept { background: #4cd964; color: white; }
        .call-drag-btn-reject, .call-drag-btn-hangup { background: #ff3b30; color: white; }
        /* 信封收件箱卡片样式 */
        .envelope-inbox-item {
    background: var(--bg-white);
    border-radius: 20px;
    padding: 14px;
    margin-bottom: 12px;
    box-shadow: var(--shadow-sm);

.envelope-inbox-avatar {

        /* 朋友圈心情行独特样式 */
        .moment-mood {
    color: #ff9f4a;
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 8px;
    display: block;
}
        .message-sticker {
    max-width: 80px;

    height: auto;

}
.moment-context-menu {

    </style>

<body>
<div class="view-container">
    <div id="chatListView" class="view active">
        <div class="chat-list-header">
            <span class="title">微聊</span>
            <div class="header-actions">
                <button class="icon-btn" id="envelopeEntryBtn" title="信封投递"><i class="fas fa-envelope"></i><span id="envelopeBadge" class="badge" style="display:none;">0</span></button>
                <button class="icon-btn" id="searchChatBtn"><i class="fas fa-search"></i></button>
                <button class="icon-btn" id="newChatBtn"><i class="fas fa-plus"></i></button>
            </div>
        </div>
        <div id="searchBar" style="display:none; padding:8px 12px;"><input type="text" id="searchInput" class="search-input" placeholder="搜索联系人..."></div>
        <div id="conversationList" style="flex:1; overflow-y:auto;"></div>
    </div>

    <div id="chatDetailView" class="view">
        <div class="chat-header">
            <button class="back-btn" id="backToChatList"><i class="fas fa-arrow-left"></i></button>
            <span class="chat-name" id="chatDetailName">加载中</span>
            <button class="chat-more" id="chatMoreBtn"><i class="fas fa-ellipsis-v"></i></button>
        </div>
        <div class="chat-messages" id="chatMessagesArea"></div>
        <div class="chat-input-area">
            <button class="voice-call-btn" id="voiceCallBtn"><i class="fas fa-phone-alt"></i></button>
            <div class="input-wrapper"><textarea id="chatInput" class="msg-input" rows="1" placeholder="输入消息..."></textarea></div>
            <button class="image-picker-btn" id="imagePickerBtn"><i class="fas fa-image"></i></button>
            <button class="emoji-btn" id="emojiPickerBtn"><i class="far fa-smile-wink"></i></button>
            <button class="send-btn" id="sendMsgBtn"><i class="fas fa-paper-plane"></i></button>
        </div>
        <div id="stickerPicker" class="sticker-picker">
            <div class="sticker-picker-grid" id="stickerPickerGrid"></div>
        </div>
    </div>

    <div id="momentsView" class="view">
        <div class="friends-header">
            <span class="title">朋友圈</span>
            <div class="header-actions">
                <button class="icon-btn" id="momentSettingsBtn"><i class="fas fa-cog"></i><span id="momentBadge" class="badge" style="display:none;">0</span></button>
                <button class="icon-btn" id="newMomentBtn"><i class="fas fa-plus"></i></button>
            </div>
        </div>
        <div id="momentsList" style="flex:1; overflow-y: auto; padding: 8px;"></div>
    </div>

    <div id="manageView" class="view">
        <div class="manage-header"><span class="title">管理</span><button class="icon-btn" id="backFromManage"><i class="fas fa-arrow-left"></i></button></div>
        <div class="settings-list" id="manageList"></div>
    </div>

    <div id="profileView" class="view">
        <div class="profile-header"><span class="title">我</span><button class="icon-btn" id="backFromProfile"><i class="fas fa-arrow-left"></i></button></div>
        <div class="settings-list" id="profileList"></div>
    </div>

    <div class="tab-bar" id="tabBar">
        <div class="tab-item active" data-view="chatListView"><i class="fas fa-comment"></i><span>聊天</span><span id="chatTabBadge" class="badge" style="display:none;">0</span></div>
        <div class="tab-item" data-view="momentsView"><i class="fas fa-globe"></i><span>朋友圈</span><span id="momentsTabBadge" class="badge" style="display:none;">0</span></div>
        <div class="tab-item" data-view="manageView"><i class="fas fa-folder-open"></i><span>管理</span></div>
        <div class="tab-item" data-view="profileView"><i class="fas fa-user"></i><span>我</span></div>
    </div>
</div>

<!-- 信封投递主模态框（重构版） -->
<div id="envelopeMainModal" class="modal">
    <div class="modal-card" style="max-width: 420px;">
        <div style="display:flex; justify-content:space-between; margin-bottom:16px;">
            <h3><i class="fas fa-envelope-open-text"></i> 信封投递</h3>
            <button id="closeEnvelopeMain" class="icon-btn"><i class="fas fa-times"></i></button>
        </div>

        <!-- 信件列表区域（默认显示） -->
        <div id="envelopeListContainer">
            <div style="display:flex; gap:12px; border-bottom:1px solid var(--border-light); margin-bottom:16px;">
                <button id="envelopeSentTab" class="btn-secondary" style="flex:1;">📤 寄出的信</button>
                <button id="envelopeReceivedTab" class="btn-secondary" style="flex:1;">📥 收到的信</button>
            </div>
            <div id="envelopeSentList" style="max-height: 300px; overflow-y: auto;"></div>
            <div id="envelopeReceivedList" style="max-height: 300px; overflow-y: auto; display: none;"></div>
        </div>

        <!-- 写信面板（初始隐藏） -->
        <div id="envelopeWritePanel" style="display: none;">
            <select id="envelopeTargetSelect" style="width:100%; padding:10px; margin-bottom:12px; border-radius:20px;"></select>
            <textarea id="envelopeContent" rows="4" placeholder="写下你想说的话..." style="width:100%; border-radius:16px; padding:12px;"></textarea>
            <div class="setting-row" style="justify-content: space-between;">
                <span>同时发送到聊天</span>
                <input type="checkbox" id="sendToChatCheckbox">
            </div>

<script>
    // ---------- 音效 ----------
    const Sound = {
        ctx: null, init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
        play(freq, dur=0.15, vol=0.2) {
            if (!this.ctx) this.init(); if (!this.ctx) return;
            const now = this.ctx.currentTime, osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
            osc.connect(gain); gain.connect(this.ctx.destination);
            osc.frequency.value = freq; gain.gain.setValueAtTime(vol, now);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + dur);
            osc.start(); osc.stop(now + dur);
        },
        send() { this.play(800,0.1); }, receive() { this.play(600,0.12,0.15); },
        ring() { this.play(1200,0.2); setTimeout(()=>this.play(1200,0.2),300); },
        connect() { this.play(600,0.2,0.3); }, hangup() { this.play(400,0.2); }
    };
    // ---------- 数据模型 ----------
    let conversations = [], messages = {}, cards = ["想念你","今天开心吗","晚安啦","照顾好自己","我在这里","一起加油","期待见面","记得想我"];
    let emojis = ["😊","❤️","🥰","✨","💕"], stickers = [], moments = [], moodPool = ["☀️ 天气真好","❤️ 有点想你","😊 心情愉悦","✨ 期待周末","🌸 微风拂面"];
    let envelopes = { sent: [], received: [] };
    let globalSettings = { fontSize: 15, theme: 'light', myAvatar: null, myNickname: '我', pushEnabled: false, chatBg: null };
    let dialogSettings = {};
    let unreadCounts = {};
    let momentUnread = 0;

    function saveAll() { localforage.setItem('wechat_final10', { conversations, messages, cards, emojis, stickers, moments, moodPool, envelopes, globalSettings, dialogSettings, unreadCounts, momentUnread }); }
    async function loadAll() {
        const data = await localforage.getItem('wechat_final10');
        if(data) {
            conversations = data.conversations || []; messages = data.messages || {}; cards = data.cards || cards; emojis = data.emojis || emojis;
            stickers = data.stickers || []; moments = data.moments || []; moodPool = data.moodPool || moodPool;
            envelopes = data.envelopes || { sent: [], received: [] };
            globalSettings = { ...globalSettings, ...(data.globalSettings || {}) };
            dialogSettings = data.dialogSettings || {};
            unreadCounts = data.unreadCounts || {};
            momentUnread = data.momentUnread || 0;
        } else {
            const defaultId = Date.now().toString();
            conversations.push({ id: defaultId, name: "小梦", avatar: null, lastMsg: "你好呀", lastTime: new Date() });
            messages[defaultId] = [{ id: Date.now(), sender: 'partner', text: "你好呀", timestamp: new Date() }];
            moments = [];
            momentUnread = 0;
        }
        applyGlobalUI(); renderConversationList(); renderMoments(); startAutoTimers(); checkEnvelopeReplies();
        updateAllBadges();startDailyLetterJob();
        if(globalSettings.chatBg) document.getElementById('chatMessagesArea').style.backgroundImage = `url(${globalSettings.chatBg})`;
        startDailyMomentJob();
    }
    function updateAllBadges() {
        let totalUnread = 0;
        conversations.forEach(c => { if(unreadCounts[c.id]) totalUnread += unreadCounts[c.id]; });
        document.getElementById('chatTabBadge').style.display = totalUnread ? 'flex' : 'none';
        document.getElementById('chatTabBadge').innerText = totalUnread > 99 ? '99+' : totalUnread;
        document.getElementById('momentsTabBadge').style.display = momentUnread ? 'flex' : 'none';
        document.getElementById('momentsTabBadge').innerText = momentUnread > 99 ? '99+' : momentUnread;
    }
    // 渲染聊天列表
    function renderConversationList(filter='') {
        const container = document.getElementById('conversationList');
        let list = conversations.filter(c => c.name.includes(filter));
        container.innerHTML = list.map(c => `
            <div class="conversation-item" data-id="${c.id}">
                <img class="conv-avatar" src="${c.avatar || 'data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'%23aaa\'%3E%3Cpath d=\'M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z\'/%3E%3C/svg%3E'}" data-id="${c.id}">
                <div class="conv-info"><div class="conv-name">${escapeHtml(c.name)}</div><div class="conv-preview">${c.lastMsg || ''}</div></div>
                <div class="conv-time">${c.lastTime ? new Date(c.lastTime).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : ''}</div>
                ${unreadCounts[c.id] ? `<div class="unread-badge">${unreadCounts[c.id] > 99 ? '99+' : unreadCounts[c.id]}</div>` : ''}
            </div>
        `).join('');
        attachConvEvents();
    }
    function attachConvEvents() {
        document.querySelectorAll('.conversation-item').forEach(el => {
            let timer;
            el.addEventListener('touchstart', (e) => { timer = setTimeout(() => showConvMenu(e, el.dataset.id), 500); });
            el.addEventListener('touchend', () => clearTimeout(timer));
            el.addEventListener('click', (e) => { if(!e.target.closest('.conv-avatar')) openChat(el.dataset.id); });
            el.querySelector('.conv-avatar').addEventListener('click', (e) => { e.stopPropagation(); openAvatarModal(el.dataset.id, 'partner'); });
        });
    }
    function showConvMenu(e, id) {
        const menu = document.createElement('div'); menu.className = 'context-menu';
        menu.innerHTML = `<div>删除对话</div><div>修改备注</div>`;
        menu.style.left = e.clientX + 'px'; menu.style.top = e.clientY + 'px';
        document.body.appendChild(menu); menu.style.display = 'block';
        menu.children[0].onclick = () => { if(confirm('删除对话？')){ conversations = conversations.filter(c=>c.id!=id); delete messages[id]; delete dialogSettings[id]; delete unreadCounts[id]; saveAll(); renderConversationList(); } menu.remove(); };
        menu.children[1].onclick = () => { let newName = prompt('新备注', conversations.find(c=>c.id===id).name); if(newName){ conversations.find(c=>c.id===id).name = newName; saveAll(); renderConversationList(); } menu.remove(); };
        setTimeout(() => document.addEventListener('click', function one(){ menu.remove(); document.removeEventListener('click',one); }), 100);
    }
    function openChat(id) {
        if(unreadCounts[id]) { delete unreadCounts[id]; saveAll(); renderConversationList(); updateAllBadges(); }
        document.getElementById('chatDetailView').dataset.dialogId = id;
        document.getElementById('chatDetailName').innerText = conversations.find(c=>c.id===id).name;
        renderChatMessages(id);
        document.getElementById('tabBar').style.display = 'none';
        switchView('chatDetailView');
    }
    function backToChatList() {
        document.getElementById('tabBar').style.display = 'flex';
        switchView('chatListView');
    }
    function renderChatMessages(dialogId) {
    const area = document.getElementById('chatMessagesArea');
    const partner = conversations.find(c => c.id === dialogId);
    const msgs = messages[dialogId] || [];
    const defaultAvatar = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23aaa'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E";

    area.innerHTML = msgs.map(msg => {
        const isSticker = msg.type === 'sticker';
        let bubbleContent = '';

        // 处理内容（图片或文字）
        if (msg.image) {
            if (isSticker) {
                // 表情包：直接显示图片，不加气泡
                bubbleContent = `<img src="${msg.image}" class="message-sticker" onclick="viewImage('${msg.image}')">`;
            } else {
                // 普通图片：带气泡样式
                bubbleContent = `<img src="${msg.image}" class="message-image" onclick="viewImage('${msg.image}')">`;
                if (msg.text) bubbleContent += `<div style="margin-top:6px;">${escapeHtml(msg.text)}</div>`;
            }
        } else {
            bubbleContent = escapeHtml(msg.text);
        }

        // 头像URL
        const avatarUrl = msg.sender === 'user'
            ? (globalSettings.myAvatar || defaultAvatar)
            : (partner?.avatar || defaultAvatar);

        // 构建消息行
        if (isSticker) {
            // 表情包消息：不带气泡，图片与头像并列
            if (msg.sender === 'user') {
                return `<div class="message-row sent">
                            ${bubbleContent}
                            <img class="message-avatar" src="${avatarUrl}" onerror="this.src='${defaultAvatar}'">
                        </div>`;
            } else {
                return `<div class="message-row received">
                            <img class="message-avatar" src="${avatarUrl}" onerror="this.src='${defaultAvatar}'">
                            ${bubbleContent}
                        </div>`;
            }
        } else {
            // 普通消息：带气泡
            if (msg.sender === 'user') {
                return `<div class="message-row sent">
                            <div class="bubble">${bubbleContent}</div>
                            <img class="message-avatar" src="${avatarUrl}" onerror="this.src='${defaultAvatar}'">
                        </div>`;
            } else {
                return `<div class="message-row received">
                            <img class="message-avatar" src="${avatarUrl}" onerror="this.src='${defaultAvatar}'">
                            <div class="bubble">${bubbleContent}</div>
                        </div>`;
            }
        }
    }).join('');

    area.scrollTop = area.scrollHeight;
}
    window.viewImage = function(src) {
        const modal = document.createElement('div');
        modal.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;';
        modal.innerHTML = `<img src="${src}" style="max-width:90%;max-height:90%;object-fit:contain;" onclick="this.parentElement.remove()">`;
        document.body.appendChild(modal);
    };
    // 生成组合字卡
    function generateMixedCard() {
        const count = Math.random() < 0.45 ? 2 + Math.floor(Math.random() * 2) : 1;
        if (count === 1) return cards[Math.floor(Math.random() * cards.length)];
        let result = "";
        const separators = ["，", "。", "？", "！", "......"];
        for (let i = 0; i < count; i++) {
            if (i > 0) result += separators[Math.floor(Math.random() * separators.length)];
            result += cards[Math.floor(Math.random() * cards.length)];
        }
        return result;
    }
    async function sendUserMessage(dialogId, text, image=null) {
        if(!text && !image) return;
        Sound.send();
        const msg = { id: Date.now(), sender: 'user', text: text || '', image: image || null, timestamp: new Date() };
        if(!messages[dialogId]) messages[dialogId]=[];
        messages[dialogId].push(msg);
        const conv = conversations.find(c=>c.id===dialogId);
        if(conv) { conv.lastMsg = text || '[图片]'; conv.lastTime = new Date(); }
        saveAll(); renderChatMessages(dialogId); renderConversationList();
        simulateReply(dialogId);
    }
    async function simulateReply(dialogId) {
        const setting = dialogSettings[dialogId] || { delayMin:2, delayMax:5, autoSendEnabled:true, mixEmoji:false, readNoReply:false, mixCards:false };
        let min = setting.minReplyCount || 1;
                let max = setting.maxReplyCount || 5;
                if (min > max) { let t = min; min = max; max = t; }
                    let count = setting.readNoReply ? Math.floor(Math.random() * (max - min + 1)) + min : (min + Math.floor(Math.random() * (max - min + 1)));
                count = Math.min(count, 10);
        for(let i=0;i<count;i++){
            setTimeout(() => {
                let typeRand = Math.random(), text = "", image = null;
                if(typeRand < 0.55) {
                    let base = setting.mixCards && Math.random() < 0.45 ? generateMixedCard() : cards[Math.floor(Math.random()*cards.length)];
                    if(setting.mixEmoji && Math.random()<0.55) base += " " + (emojis[Math.floor(Math.random()*emojis.length)]||"✨");
                    text = base;
                } else if(typeRand < 0.85) {
                    if(stickers.length) {
                        image = stickers[Math.floor(Math.random()*stickers.length)];
                        text = "";
                    } else {
                        text = emojis[Math.floor(Math.random()*emojis.length)]||"😊";
                    }
                } else {
                    text = emojis[Math.floor(Math.random()*emojis.length)]||"❤️";
                }
                const msg = { id: Date.now(), sender: 'partner', text, image, timestamp: new Date() };
                messages[dialogId].push(msg);
                const conv = conversations.find(c=>c.id===dialogId);
                if(conv) { conv.lastMsg = text || '[图片]'; conv.lastTime = new Date(); }
                if(document.getElementById('chatDetailView').dataset.dialogId !== dialogId) {
                    unreadCounts[dialogId] = (unreadCounts[dialogId]||0) + 1;
                }
                saveAll(); 
                if(document.getElementById('chatDetailView').dataset.dialogId === dialogId) renderChatMessages(dialogId);
                renderConversationList();
                updateAllBadges();
                Sound.receive();
            }, (setting.delayMin + Math.random()*(setting.delayMax-setting.delayMin)) * 1000);
        }
    }
    let autoTimers = {};
    function startAutoTimers() {
        Object.values(autoTimers).forEach(clearInterval);
        conversations.forEach(conv => {
            const setting = dialogSettings[conv.id] || {};
            if(setting.autoSendEnabled !== false) {
                autoTimers[conv.id] = setInterval(() => { if(Math.random()<0.7) simulateReply(conv.id); }, (setting.autoInterval||5)*60*1000);
            }
        });
    }
    function openAvatarModal(dialogId, type) {
        const input = document.createElement('input'); input.type='file'; input.accept='image/*';
        input.onchange = async(e) => {
            const file = e.target.files[0]; if(!file) return;
            const data = await compressImage(file);
            if(type === 'partner') {
                const conv = conversations.find(c=>c.id===dialogId);
                if(conv) conv.avatar = data;
            } else { globalSettings.myAvatar = data; }
            saveAll(); renderConversationList();
            if(document.getElementById('chatDetailView').dataset.dialogId === dialogId) renderChatMessages(dialogId);
        };
        input.click();
    }
    // 信封投递
    function showEnvelope() {
    // 刷新寄出和收件列表
    renderEnvelopeSentList();
    renderEnvelopeReceivedList();
    // 显示列表容器，隐藏写信面板
    document.getElementById('envelopeListContainer').style.display = 'block';
    document.getElementById('envelopeWritePanel').style.display = 'none';
    document.getElementById('envelopeListFooter').style.display = 'flex';
    // 手动设置默认显示寄出列表（样式和可见性）
    document.getElementById('envelopeSentList').style.display = 'block';
    document.getElementById('envelopeReceivedList').style.display = 'none';
    document.getElementById('envelopeSentTab').classList.add('btn-primary');
    document.getElementById('envelopeSentTab').classList.remove('btn-secondary');
    document.getElementById('envelopeReceivedTab').classList.add('btn-secondary');
    document.getElementById('envelopeReceivedTab').classList.remove('btn-primary');
    // 打开模态框
    document.getElementById('envelopeMainModal').style.display = 'flex';
}
function sendEnvelope(targetId, content, sendToChat) {
    if (!content.trim()) {
        alert('请写下你想说的话');
        return;
    }
    const newId = Date.now().toString();
    const delayHours = 8 + Math.random() * 4; // 8-12小时
    const replyTime = Date.now() + delayHours * 3600000;

    // 保存发送的信件
    envelopes.sent.push({
        id: newId,
        targetId,
        content,
        sendTime: Date.now(),
        replyTime,
        status: 'pending'
    });

    // 可选：同步到聊天窗口
    if (sendToChat && messages[targetId]) {
        messages[targetId].push({
            id: Date.now(),
            sender: 'user',
            text: `📮 寄出一封信：${content.substring(0,50)}...`,
            timestamp: new Date(),
            type: 'system'
        });
        const conv = conversations.find(c => c.id === targetId);
        if (conv) {
            conv.lastMsg = `📮 寄出一封信：${content.substring(0,30)}...`;
            conv.lastTime = new Date();
        }
        saveAll();
        if (document.getElementById('chatDetailView').dataset.dialogId === targetId) {
            renderChatMessages(targetId);
        }
        renderConversationList();
    }

    saveAll();

    // 设置定时回信
    setTimeout(() => {
        processReply(targetId, newId);
    }, delayHours * 3600000);
}
function processReply(targetId, letterId) {
    const letter = envelopes.sent.find(l => l.id === letterId);
    if (!letter || letter.status !== 'pending') return;

    // 生成回信内容（更自然）
    let reply = generateRandomLetterContent();

    letter.status = 'replied';
    letter.replyContent = reply;
    letter.replyReceivedTime = Date.now();

    envelopes.received.unshift({
    id: Date.now().toString(),
    fromId: targetId,
    content: reply,
    receivedTime: Date.now(),
    isNew: true,
    originalLetterId: letterId   // 记录对应的寄出信件 ID
});

    saveAll();
    updateEnvelopeBadge();

    // 如果信封模态框打开且收件箱标签页处于显示状态，则刷新收件列表
const modal = document.getElementById('envelopeMainModal');
if (modal.style.display === 'flex' && document.getElementById('envelopeReceivedList').style.display === 'block') {
    renderEnvelopeReceivedList();
}

    // 可选：聊天中提示收到回信（系统消息）
    const dialogId = targetId;
    if (messages[dialogId]) {
        messages[dialogId].push({
            id: Date.now(),
            sender: 'system',
            text: `✉️ 收到了来自 ${conversations.find(c=>c.id===targetId)?.name} 的回信`,
            timestamp: new Date()
        });
        const conv = conversations.find(c => c.id === dialogId);
        if (conv) {
            conv.lastMsg = `✉️ 收到了回信`;
            conv.lastTime = new Date();
        }
        saveAll();
        if (document.getElementById('chatDetailView').dataset.dialogId === dialogId) {
            renderChatMessages(dialogId);
        }
        renderConversationList();
    }
}
function generateRandomLetterContent() {
    let length = 3 + Math.floor(Math.random() * 5);
    let sentences = [];
    for (let i = 0; i < length; i++) {
        let base = cards[Math.floor(Math.random() * cards.length)] || "想你了";
        if (Math.random() < 0.4) base += " " + (emojis[Math.floor(Math.random() * emojis.length)] || "❤️");
        sentences.push(base);
    }
    let punctuation = ["。", "！", "……", "~", "，"];
    let fullText = sentences.map((s, idx) => {
        let punc = idx === sentences.length - 1 ? "。" : punctuation[Math.floor(Math.random() * punctuation.length)];
        return s + punc;
    }).join(" ");
    if (Math.random() < 0.3 && stickers.length) {
        fullText += " [图片]";
    }
    return fullText;
}

    envelopes.received.unshift({
        id: Date.now().toString(),
        fromId: contactId,
        content: content,
        receivedTime: Date.now(),

    }

if (modal.style.display === 'flex' && document.getElementById('envelopeReceivedList').style.display === 'block') {

function startDailyLetterJob() {
    const today = new Date().toDateString();
    const lastActiveDate = localStorage.getItem('lastActiveLetterDate');
    if (lastActiveDate !== today) {
        localStorage.setItem('lastActiveLetterDate', today);
        conversations.forEach(contact => {
            if (Math.random() < 0.2) {
                sendActiveLetterFromContact(contact.id);
            }
        });
    }
    setInterval(() => {
        const now = new Date().toDateString();
        const last = localStorage.getItem('lastActiveLetterDate');
        if (last !== now) {
            localStorage.setItem('lastActiveLetterDate', now);
            conversations.forEach(contact => {
                if (Math.random() < 0.2) {
                    sendActiveLetterFromContact(contact.id);
                }
            });
        }
    }, 3600000);
}

        container.innerHTML = '<div style="text-align:center; padding:20px; color:var(--text-secondary);">📭 暂无收到的信</div>';
        return;
    }
    container.innerHTML = list.map(letter => {
        const contact = conversations.find(c => c.id === letter.fromId);
        const name = contact ? contact.name : '未知联系人';
        const avatar = contact?.avatar || 'data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'%23aaa\'%3E%3Cpath d=\'M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z\'/%3E%3C/svg%3E';

    container.querySelectorAll('.envelope-inbox-item').forEach(el => {

function checkEnvelopeReplies() {
    setInterval(() => {
        let changed = false;
        envelopes.sent.forEach(letter => {
            if (letter.status === 'pending' && Date.now() >= letter.replyTime) {
                processReply(letter.targetId, letter.id);
                changed = true;
            }
        });
        if (changed) {
            saveAll();
            updateEnvelopeBadge();
            if (document.getElementById('envelopeReceivedList').style.display === 'block') {
                renderEnvelopeReceivedList();
            }
        }
    }, 60000);
}

function attachMomentEvents() {
    // 点赞按钮
    document.querySelectorAll('.like-btn').forEach(btn => btn.addEventListener('click', (e) => {
        const mid = parseInt(btn.dataset.id);
        const moment = moments.find(m => m.id === mid);
        if (moment) {
            if (!moment.likes) moment.likes = [];
            const idx = moment.likes.indexOf(globalSettings.myNickname);
            if (idx === -1) moment.likes.push(globalSettings.myNickname);
            else moment.likes.splice(idx, 1);
            saveAll();
            renderMoments();
        }
    }));

    // 评论按钮
    document.querySelectorAll('.comment-btn').forEach(btn => btn.addEventListener('click', (e) => {
        const mid = parseInt(btn.dataset.id);
        const moment = moments.find(m => m.id === mid);
        if (moment) {
            let txt = prompt('评论内容');
            if (txt) {
                if (!moment.comments) moment.comments = [];
                const newComment = { id: Date.now().toString(), author: globalSettings.myNickname, text: txt };
                moment.comments.push(newComment);
                saveAll();
                renderMoments();
                // 如果作者是联系人，可能自动回复（1-3分钟）
                if (moment.authorId !== 'user') {
                    const partner = conversations.find(c => c.id === moment.authorId);
                    if (partner && Math.random() < 0.6) {
                        const delay = 60000 + Math.random() * 120000;
                        setTimeout(() => {
                            const momentToComment = moments.find(m => m.id === mid);
                            if (momentToComment && !momentToComment.comments.some(c => c.author === partner.name)) {
                                const replyCount = 1 + Math.floor(Math.random() * 3);
                                let replyText = "";
                                for (let i = 0; i < replyCount; i++) {
                                    if (i > 0) replyText += ["，", "。", "！", "......"][Math.floor(Math.random() * 4)];
                                    replyText += cards[Math.floor(Math.random() * cards.length)];
                                }
                                if (Math.random() < 0.5) replyText += " " + emojis[Math.floor(Math.random() * emojis.length)];
                                if (Math.random() < 0.3 && stickers.length) replyText += " [图片]";
                                momentToComment.comments.push({ id: Date.now().toString(), author: partner.name, text: replyText });
                                saveAll();
                                renderMoments();
                            }
                        }, delay);
                    }
                }
            }
        }
    }));

    // 删除评论按钮
    document.querySelectorAll('.comment-del').forEach(del => del.addEventListener('click', (e) => {
        const mid = parseInt(del.dataset.mid);
        const cid = del.dataset.cid;
        const moment = moments.find(m => m.id === mid);
        if (moment) moment.comments = moment.comments.filter(c => c.id != cid);
        saveAll();
        renderMoments();
    }));

    // 三个点菜单（浮窗）
    document.querySelectorAll('.moment-more-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const mid = parseInt(btn.dataset.id);
            const moment = moments.find(m => m.id === mid);
            if (!moment) return;

            // 移除已存在的菜单
            const existingMenu = document.querySelector('.moment-context-menu');
            if (existingMenu) existingMenu.remove();

            const menu = document.createElement('div');
            menu.className = 'moment-context-menu';
            menu.style.position = 'fixed';
            menu.style.background = 'var(--bg-white)';
            menu.style.borderRadius = '12px';
            menu.style.boxShadow = '0 4px 20px rgba(0,0,0,0.2)';
            menu.style.zIndex = '2000';
            menu.style.overflow = 'hidden';
            menu.style.minWidth = '120px';
            menu.innerHTML = `
                <div style="padding: 12px 20px; cursor: pointer;">✏️ 修改</div>
                <div style="padding: 12px 20px; cursor: pointer;">🗑️ 删除</div>
                <div style="padding: 12px 20px; cursor: pointer;">❌ 关闭</div>
            `;
            const rect = btn.getBoundingClientRect();
            menu.style.left = rect.left + 'px';
            menu.style.top = rect.bottom + 'px';
            document.body.appendChild(menu);

            const handleClick = (e) => {
                const targetText = e.target.innerText;
                if (targetText.includes('修改')) {
                    let newText = prompt('新内容', moment.content);
                    if (newText !== null && newText.trim()) {
                        moment.content = newText;
                        if (moment.mood) delete moment.mood;
                        saveAll();
                        renderMoments();
                    }
                } else if (targetText.includes('删除')) {
                    if (confirm('确认删除这条朋友圈？')) {
                        moments = moments.filter(m => m.id !== mid);
                        saveAll();
                        renderMoments();
                    }
                }
                menu.remove();
                document.removeEventListener('click', handleClickOutside);
            };

            const handleClickOutside = (e) => {
                if (!menu.contains(e.target)) {
                    menu.remove();
                    document.removeEventListener('click', handleClickOutside);
                }
            };

            menu.querySelectorAll('div').forEach(div => div.addEventListener('click', handleClick));
            setTimeout(() => document.addEventListener('click', handleClickOutside), 0);
        });
    });

    function generateRandomMomentContentWithMood() {
    let mood = moodPool[Math.floor(Math.random() * moodPool.length)];

    let rest = "";
    for (let i = 0; i < cardCount; i++) {

        rest += cards[Math.floor(Math.random() * cards.length)];

    if (Math.random() < 0.3 && stickers.length) rest += " [图片]";
    const fullContent = mood + " " + rest;
    return { mood, fullContent };

        conversations.forEach(conv => {
            if(Math.random()<0.6){
                const delay = 60000 + Math.random() * 120000;  
                setTimeout(() => {
                    const momentToComment = moments.find(m => m.id === newMoment.id);
                    if(momentToComment && !momentToComment.comments.some(c => c.author === conv.name)){
                        const replyCount = 1 + Math.floor(Math.random()*3);
                        let replyText = "";
                        for(let i=0;i<replyCount;i++){
                            if(i>0) replyText += ["，","。","！","......"][Math.floor(Math.random()*4)];
                            replyText += cards[Math.floor(Math.random()*cards.length)];
                        }
                        if(Math.random()<0.5) replyText += " " + emojis[Math.floor(Math.random()*emojis.length)];
                        if(Math.random()<0.3 && stickers.length) replyText += " [图片]";
                        momentToComment.comments.push({ id:Date.now().toString(), author:conv.name, text:replyText });
                        saveAll(); renderMoments();
                    }
                }, delay);
            }
        });
    }

    function initDragCall() {
        const drag = document.getElementById('callDrag');
        let isDragging = false, startX, startY, startLeft, startTop;
        drag.addEventListener('mousedown', (e) => {
            if (e.target.closest('.call-drag-buttons')) return;
            isDragging = true;
            let rect = drag.getBoundingClientRect();
            startLeft = rect.left; startTop = rect.top;
            startX = e.clientX; startY = e.clientY;
            drag.style.cursor = 'grabbing';
            const onMove = (move) => {
                let dx = move.clientX - startX, dy = move.clientY - startY;
                let newLeft = Math.min(window.innerWidth - drag.offsetWidth, Math.max(0, startLeft + dx));
                let newTop = Math.min(window.innerHeight - drag.offsetHeight, Math.max(0, startTop + dy));
                drag.style.left = newLeft + 'px'; drag.style.top = newTop + 'px';
                drag.style.right = 'auto'; drag.style.bottom = 'auto';
            };
            const onUp = () => {
                isDragging = false;
                drag.style.cursor = 'grab';
                document.removeEventListener('mousemove', onMove);
                document.removeEventListener('mouseup', onUp);
            };
            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onUp);
            e.preventDefault();
        });
        drag.style.cursor = 'grab';
    }

    async function compressImage(file) { return new Promise(resolve=>{ let reader=new FileReader(); reader.onload=ev=>{ let img=new Image(); img.onload=()=>{ let canvas=document.createElement('canvas'), ctx=canvas.getContext('2d'); let max=300, w=img.width, h=img.height; if(w>max){ h*=max/w; w=max; } canvas.width=w; canvas.height=h; ctx.drawImage(img,0,0,w,h); resolve(canvas.toDataURL('image/jpeg',0.7)); }; img.src=ev.target.result; }; reader.readAsDataURL(file); }); }

    select.innerHTML = conversations.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
    // 隐藏列表区域，显示写信面板
    document.getElementById('envelopeListContainer').style.display = 'none';
    document.getElementById('envelopeListFooter').style.display = 'none';
    document.getElementById('envelopeWritePanel').style.display = 'block';
};

// 返回列表按钮
document.getElementById('backToListBtn').onclick = () => {
    document.getElementById('envelopeWritePanel').style.display = 'none';
    document.getElementById('envelopeListContainer').style.display = 'block';
    document.getElementById('envelopeListFooter').style.display = 'flex';
    // 刷新列表
    renderEnvelopeSentList();
    renderEnvelopeReceivedList();
    // 重新触发当前活动标签页的点击，确保显示正确的列表
    if (document.getElementById('envelopeSentList').style.display === 'block') {
        document.getElementById('envelopeSentTab').click();
    } else {
        document.getElementById('envelopeReceivedTab').click();
    }
};

// 关闭按钮（底部）
document.getElementById('closeEnvelopeMainBottom').onclick = () => {
    document.getElementById('envelopeMainModal').style.display = 'none';
};
        
        document.getElementById('sendEnvelopeBtn').onclick = () => {
    let target = document.getElementById('envelopeTargetSelect').value;
    let text = document.getElementById('envelopeContent').value;
    let sendToChat = document.getElementById('sendToChatCheckbox').checked;
    sendEnvelope(target, text, sendToChat);
    // 发送后清空内容并返回列表
    document.getElementById('envelopeContent').value = '';
    document.getElementById('backToListBtn').click();
};
        document.getElementById('imagePickerBtn').onclick = () => {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const compressed = await compressImage(file);
        const dialogId = document.getElementById('chatDetailView').dataset.dialogId;
        if (dialogId) {
            // 发送图片消息，type 为 image（非表情包）
            const msg = { id: Date.now(), sender: 'user', text: '', image: compressed, type: 'image', timestamp: new Date() };
            if (!messages[dialogId]) messages[dialogId] = [];
            messages[dialogId].push(msg);
            const conv = conversations.find(c => c.id === dialogId);
            if (conv) { conv.lastMsg = '[图片]'; conv.lastTime = new Date(); }
            saveAll();
            renderChatMessages(dialogId);
            renderConversationList();
            simulateReply(dialogId);
            Sound.send();
        }
    };
    input.click();
};

            let selectedColor = colors[0];

                colorDiv.querySelectorAll('.color-dot').forEach(d=>d.classList.remove('selected'));
                dot.classList.add('selected');

            document.getElementById('confirmAddMood').onclick = () => {
                let emoji = document.getElementById('newMoodEmoji').value.trim() || '✨';

        // 绑定信件详情模态框关闭

document.getElementById('closeLetterDetailBtn').onclick = () => document.getElementById('letterDetailModal').style.display = 'none';

        document.getElementById('changeMyAvatarBtn').onclick = () => { let input=document.createElement('input'); input.type='file'; input.accept='image/*'; input.onchange=async(e)=>{ let file=e.target.files[0]; if(file){ let data=await compressImage(file); globalSettings.myAvatar=data; applyGlobalUI(); saveAll(); } }; input.click(); };
        document.getElementById('editNicknameBtn').onclick = () => { let newName=prompt('新昵称', globalSettings.myNickname); if(newName){ globalSettings.myNickname=newName; applyGlobalUI(); saveAll(); } };
        document.getElementById('fontSlider').addEventListener('input', (e)=>{ globalSettings.fontSize=e.target.value; applyGlobalUI(); saveAll(); });
        document.getElementById('themeSelect').addEventListener('change', (e)=>{ globalSettings.theme=e.target.value; applyGlobalUI(); saveAll(); });
        document.getElementById('exportCardsOnlyBtn').onclick = () => { let blob=new Blob([JSON.stringify(cards)],{type:'application/json'}); let a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='cards.json'; a.click(); };
        document.getElementById('importCardsOnlyBtn').onclick = () => { let input=document.createElement('input'); input.type='file'; input.accept='.json'; input.onchange=e=>{ let file=e.target.files[0]; let reader=new FileReader(); reader.onload=ev=>{ let imported=JSON.parse(ev.target.result); if(Array.isArray(imported)) cards=imported; saveAll(); if(document.getElementById('cardManageModal').style.display==='flex') showCardManageUI(); }; reader.readAsText(file); }; input.click(); };
        document.getElementById('exportAllBtn').onclick = () => { let blob=new Blob([JSON.stringify({conversations,messages,cards,emojis,stickers,moments,moodPool,envelopes,globalSettings,dialogSettings,unreadCounts})],{type:'application/json'}); let a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='full_backup.json'; a.click(); };
        document.getElementById('importAllBtn').onclick = () => { let input=document.createElement('input'); input.type='file'; input.accept='.json'; input.onchange=e=>{ let file=e.target.files[0]; let reader=new FileReader(); reader.onload=ev=>{ let data=JSON.parse(ev.target.result); Object.assign(globalSettings,data.globalSettings||{}); conversations=data.conversations||[]; messages=data.messages||{}; cards=data.cards||[]; emojis=data.emojis||[]; stickers=data.stickers||[]; moments=data.moments||[]; moodPool=data.moodPool||[]; envelopes=data.envelopes||{sent:[],received:[]}; dialogSettings=data.dialogSettings||{}; unreadCounts=data.unreadCounts||{}; saveAll(); location.reload(); }; reader.readAsText(file); }; input.click(); };

        document.getElementById('pushNotifyToggle').onchange = (e)=>{ globalSettings.pushEnabled=e.target.checked; saveAll(); };
        setInterval(()=>{ conversations.forEach(c=>generateRandomMoment(c.id)); renderMoments(); updateAllBadges(); }, 86400000);
        setInterval(()=>{ if(document.getElementById('chatDetailView').classList.contains('active')){ let id=document.getElementById('chatDetailView').dataset.dialogId; if(id&&Math.random()<0.05){ let name=conversations.find(c=>c.id===id)?.name; if(name) showCallDrag(name, true); } } }, 300000);
    });
